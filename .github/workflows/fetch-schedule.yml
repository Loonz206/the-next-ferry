name: Fetch Schedule & Deploy

on:
  schedule:
    # Daily at 5am UTC (~10pm PT) — refresh for the next day
    - cron: '0 5 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch schedule data
        run: npx tsx scripts/fetch-schedule.ts
        env:
          WSDOT_API_KEY: ${{ secrets.WSDOT_API_KEY }}

      - name: Commit schedule data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/schedule.json
          if git diff --cached --quiet; then
            echo "No schedule changes detected"
          else
            git commit -m "chore: update schedule data [skip ci]"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
